name: 🎬 Faceless Video Pipeline

on:
  # Two batches per day — each batch posts 2 videos (different niches)
  # Batch 1: 9am ET  → Historical Mysteries + Stoic Philosophy
  # Batch 2: 9pm ET  → Ocean Mysteries + Mind Benders
  schedule:
    - cron: '0 13 * * *'   # 9am ET  — Batch 1
    - cron: '0 1  * * *'   # 9pm ET  — Batch 2

  # External trigger (cron-job.org backup in case GitHub scheduler skips)
  # POST https://api.github.com/repos/JJgithu/faceless-video-network/dispatches
  # Body: {"event_type": "morning_batch"} or {"event_type": "evening_batch"}
  repository_dispatch:
    types: [morning_batch, evening_batch]

  # Manual trigger — pick one niche or run the full batch
  workflow_dispatch:
    inputs:
      niche:
        description: 'Specific niche (leave as "auto_batch" to run both niches for this time of day)'
        required: false
        default: 'auto_batch'
        type: choice
        options:
          - auto_batch
          - historical_mysteries
          - stoic_philosophy
          - deep_sea
          - riddles
      dry_run:
        description: 'Generate video but skip upload (for testing)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  generate-and-upload:
    name: "🎬 Daily Video Batch"
    runs-on: ubuntu-latest
    timeout-minutes: 60   # two full videos need up to 60 min

    permissions:
      contents: write   # needed to commit topic history back to repo

    steps:
      # ── Setup ───────────────────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 🔧 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            fonts-noto-core \
            fonts-noto-extra \
            libfontconfig1

      - name: 📦 Install Python dependencies
        run: pip install -r requirements.txt

      # ── Run pipeline (two niches back-to-back) ──────────────────────────────
      - name: 🎬 Run video pipeline
        env:
          # Core AI
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY:    ${{ secrets.ELEVENLABS_API_KEY }}

          # Pexels stock footage
          PEXELS_API_KEY:        ${{ secrets.PEXELS_API_KEY }}

          # YouTube OAuth
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}

          # TikTok
          TIKTOK_CLIENT_KEY:     ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET:  ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_ACCESS_TOKEN:   ${{ secrets.TIKTOK_ACCESS_TOKEN }}

          # Affiliate (Amazon Associates covers both Amazon books + Audible)
          AMAZON_AFFILIATE_TAG:  ${{ secrets.AMAZON_AFFILIATE_TAG }}
          AUDIBLE_AFFILIATE_TAG: ${{ secrets.AUDIBLE_AFFILIATE_TAG }}

          # Per-niche ElevenLabs voices (optional — falls back to default)
          EL_VOICE_HISTORY:      ${{ secrets.EL_VOICE_HISTORY }}
          EL_VOICE_STOIC:        ${{ secrets.EL_VOICE_STOIC }}
          EL_VOICE_OCEAN:        ${{ secrets.EL_VOICE_OCEAN }}
          EL_VOICE_RIDDLES:      ${{ secrets.EL_VOICE_RIDDLES }}

          # Affiliate links (optional)
          AFFILIATE_HISTORY:     ${{ secrets.AFFILIATE_HISTORY }}
          AFFILIATE_STOIC:       ${{ secrets.AFFILIATE_STOIC }}
          AFFILIATE_OCEAN:       ${{ secrets.AFFILIATE_OCEAN }}
          AFFILIATE_RIDDLES:     ${{ secrets.AFFILIATE_RIDDLES }}

        run: |
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi

          # ── Determine which niches to run ──────────────────────────────────
          # Priority: manual niche > repository_dispatch event > schedule cron
          MANUAL_NICHE="${{ github.event.inputs.niche }}"
          SCHEDULE="${{ github.event.schedule }}"
          DISPATCH_TYPE="${{ github.event.action }}"

          if [ "$MANUAL_NICHE" != "" ] && [ "$MANUAL_NICHE" != "auto_batch" ]; then
            # Single niche manual run
            NICHES="$MANUAL_NICHE"
          elif [ "$DISPATCH_TYPE" = "morning_batch" ]; then
            # Triggered by cron-job.org morning call
            NICHES="historical_mysteries stoic_philosophy"
          elif [ "$DISPATCH_TYPE" = "evening_batch" ]; then
            # Triggered by cron-job.org evening call
            NICHES="deep_sea riddles"
          elif [ "$SCHEDULE" = "0 13 * * *" ]; then
            # 9am ET GitHub scheduled morning batch
            NICHES="historical_mysteries stoic_philosophy"
          elif [ "$SCHEDULE" = "0 1 * * *" ]; then
            # 9pm ET GitHub scheduled evening batch
            NICHES="deep_sea riddles"
          else
            # Manual auto_batch — run morning pair by default
            NICHES="historical_mysteries stoic_philosophy"
          fi

          echo "► Niches to run: $NICHES"
          for NICHE in $NICHES; do
            echo ""
            echo "────────────────────────────────────────────────────────"
            echo "► Starting video: $NICHE"
            echo "────────────────────────────────────────────────────────"
            NICHE=$NICHE python main.py $DRY_FLAG
          done

      # ── Upload artifacts on dry-run ──────────────────────────────────────────
      - name: 📤 Upload preview videos (dry-run only)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: preview-videos-${{ github.run_id }}
          path: ${{ runner.temp }}/faceless/
          retention-days: 3

      # ── Commit topic history (merge strategy avoids rebase conflicts) ────────
      - name: 💾 Save topic history
        if: always()
        run: |
          git config user.name  "Faceless Bot"
          git config user.email "bot@faceless.local"
          git add data/used_topics.json
          git diff --staged --quiet || \
            git commit -m "chore: update topic history [batch] [skip ci]"
          # Use merge instead of rebase — resolves conflicts by keeping our new entries
          git fetch origin main
          git merge origin/main -X ours --no-edit || true
          git push origin main
