name: 🎬 Faceless Video Pipeline

on:
  # Run twice per day — 9am ET (1pm UTC) and 9pm ET (1am UTC next day)
  schedule:
    - cron: '0 13 * * *'   # 9am ET  — morning video
    - cron: '0 1  * * *'   # 9pm ET  — evening video

  # Allow manual triggers (great for testing or forced runs)
  workflow_dispatch:
    inputs:
      niche:
        description: 'Which niche channel to run'
        required: false
        default: 'historical_mysteries'
        type: choice
        options:
          - historical_mysteries
          - stoic_philosophy
          - deep_sea
          - riddles
      dry_run:
        description: 'Generate video but skip upload'
        required: false
        default: false
        type: boolean

jobs:
  generate-and-upload:
    name: "${{ github.event.inputs.niche || 'auto' }} — Generate & Upload"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write   # needed to commit topic history back to repo

    # Rotate through niches automatically based on run number
    # Morning = historical_mysteries / deep_sea
    # Evening = stoic_philosophy / riddles
    env:
      NICHE: ${{ github.event.inputs.niche || 'historical_mysteries' }}

    steps:
      # ── Setup ─────────────────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 🔧 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            fonts-noto-core \
            fonts-noto-extra \
            libfontconfig1

      - name: 📦 Install Python dependencies
        run: pip install -r requirements.txt

      # ── Run pipeline ───────────────────────────────────────────────────────
      - name: 🎬 Run video pipeline
        env:
          # Core AI
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY:    ${{ secrets.ELEVENLABS_API_KEY }}

          # Pexels stock footage
          PEXELS_API_KEY:        ${{ secrets.PEXELS_API_KEY }}

          # YouTube OAuth
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}

          # TikTok (global — add per-niche tokens when you have multiple accounts)
          TIKTOK_CLIENT_KEY:     ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET:  ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_ACCESS_TOKEN:   ${{ secrets.TIKTOK_ACCESS_TOKEN }}

          # Per-niche ElevenLabs voices (optional — falls back to default voice)
          EL_VOICE_HISTORY:      ${{ secrets.EL_VOICE_HISTORY }}
          EL_VOICE_STOIC:        ${{ secrets.EL_VOICE_STOIC }}
          EL_VOICE_OCEAN:        ${{ secrets.EL_VOICE_OCEAN }}
          EL_VOICE_RIDDLES:      ${{ secrets.EL_VOICE_RIDDLES }}

          # Affiliate links (optional)
          AFFILIATE_HISTORY:     ${{ secrets.AFFILIATE_HISTORY }}
          AFFILIATE_STOIC:       ${{ secrets.AFFILIATE_STOIC }}
          AFFILIATE_OCEAN:       ${{ secrets.AFFILIATE_OCEAN }}
          AFFILIATE_RIDDLES:     ${{ secrets.AFFILIATE_RIDDLES }}

          # Active niche (set by matrix or manual input)
          NICHE: ${{ env.NICHE }}
        run: |
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          python main.py $DRY_FLAG

      # ── Commit updated topic history ───────────────────────────────────────
      - name: 💾 Save topic history
        if: always()   # Always commit even if upload failed (topic was still used)
        run: |
          git config user.name  "Faceless Bot"
          git config user.email "bot@faceless.local"
          git add data/used_topics.json
          git diff --staged --quiet || \
            git commit -m "chore: update topic history [${{ env.NICHE }}] [skip ci]"
          git push
