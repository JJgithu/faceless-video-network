name: 🎬 Faceless Video Pipeline

on:
  # ONE video per day — morning run only
  schedule:
    - cron: '0 13 * * *'   # 9am ET — Morning run

  # External trigger (cron-job.org backup in case GitHub scheduler skips)
  # POST https://api.github.com/repos/JJgithu/faceless-video-network/dispatches
  # Body: {"event_type": "morning_batch"}
  repository_dispatch:
    types: [morning_batch]

  # Manual trigger — pick one niche or run the full rotation
  workflow_dispatch:
    inputs:
      niche:
        description: 'Specific niche (or "auto_batch" to rotate automatically)'
        required: false
        default: 'auto_batch'
        type: choice
        options:
          - auto_batch
          - historical_mysteries
          - deep_sea
          - body_science
          - alternate_history
      dry_run:
        description: 'Generate video but skip upload (for testing)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      pipeline:
        description: 'Pipeline mode'
        required: false
        default: 'hybrid'
        type: choice
        options:
          - 'hybrid'
          - 'legacy'

jobs:
  generate-and-upload:
    name: "🎬 Video Generation"
    runs-on: ubuntu-latest
    timeout-minutes: 45   # hybrid pipeline with Kling polling needs more time

    permissions:
      contents: write   # needed to commit topic history back to repo

    steps:
      # ── Setup ───────────────────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 🔧 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            fonts-noto-core \
            fonts-noto-extra \
            libfontconfig1

      - name: 📦 Install Python dependencies
        run: pip install -r requirements.txt

      # ── Run pipeline (2 videos per day — morning + evening) ──────────────
      - name: 🎬 Run video pipeline
        env:
          # Pipeline mode
          PIPELINE_MODE: ${{ github.event.inputs.pipeline || 'hybrid' }}

          # Anthropic (Claude 3.5 Sonnet — hybrid brain)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

          # Kling AI (AI video generation)
          KLING_API_KEY: ${{ secrets.KLING_API_KEY }}

          # Gemini (legacy pipeline + SFX tagging)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

          # ElevenLabs (primary voice — Edge TTS is free fallback, no key needed)
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}

          # Pexels stock footage (legacy + fallback)
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

          # YouTube OAuth
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}

          # TikTok
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}

          # Affiliate (Amazon Associates covers both Amazon books + Audible)
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
          AUDIBLE_AFFILIATE_TAG: ${{ secrets.AUDIBLE_AFFILIATE_TAG }}

          # Per-niche ElevenLabs voices
          EL_VOICE_HISTORY: ${{ secrets.EL_VOICE_HISTORY }}
          EL_VOICE_OCEAN: ${{ secrets.EL_VOICE_OCEAN }}
          EL_VOICE_BODY: ${{ secrets.EL_VOICE_BODY }}
          EL_VOICE_ALTHISTORY: ${{ secrets.EL_VOICE_ALTHISTORY }}

          # Per-niche YouTube channel IDs
          YT_CHANNEL_ID_HISTORY: ${{ secrets.YT_CHANNEL_ID_HISTORY }}
          YT_CHANNEL_ID_OCEAN: ${{ secrets.YT_CHANNEL_ID_OCEAN }}
          YT_CHANNEL_ID_BODY: ${{ secrets.YT_CHANNEL_ID_BODY }}
          YT_CHANNEL_ID_ALTHISTORY: ${{ secrets.YT_CHANNEL_ID_ALTHISTORY }}

          # Per-niche TikTok tokens
          TIKTOK_TOKEN_HISTORY: ${{ secrets.TIKTOK_TOKEN_HISTORY }}
          TIKTOK_TOKEN_OCEAN: ${{ secrets.TIKTOK_TOKEN_OCEAN }}
          TIKTOK_TOKEN_BODY: ${{ secrets.TIKTOK_TOKEN_BODY }}
          TIKTOK_TOKEN_ALTHISTORY: ${{ secrets.TIKTOK_TOKEN_ALTHISTORY }}

          # Affiliate links (optional)
          AFFILIATE_HISTORY: ${{ secrets.AFFILIATE_HISTORY }}
          AFFILIATE_OCEAN: ${{ secrets.AFFILIATE_OCEAN }}
          AFFILIATE_BODY: ${{ secrets.AFFILIATE_BODY }}
          AFFILIATE_ALTHISTORY: ${{ secrets.AFFILIATE_ALTHISTORY }}

        run: |
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi

          # ── Determine which niche to run ───────────────────────────────────
          # 4 niches rotate daily — 1 video per day
          MANUAL_NICHE="${{ github.event.inputs.niche }}"

          # 4 active niches in rotation order
          ALL_NICHES=(historical_mysteries deep_sea body_science alternate_history)
          N=${#ALL_NICHES[@]}  # 4

          # Day-of-year based rotation (1 niche per day)
          DAY=$(( $(date -u +%j) - 1 ))   # 0-365
          NICHE_INDEX=$(( DAY % N ))
          AUTO_NICHE=${ALL_NICHES[$NICHE_INDEX]}

          if [ "$MANUAL_NICHE" != "" ] && [ "$MANUAL_NICHE" != "auto_batch" ]; then
            NICHE="$MANUAL_NICHE"
          else
            NICHE="$AUTO_NICHE"
          fi

          echo ""
          echo "════════════════════════════════════════════════════════"
          echo "► Pipeline: ${PIPELINE_MODE:-hybrid}"
          echo "► Niche: $NICHE"
          echo "════════════════════════════════════════════════════════"
          NICHE=$NICHE python main.py $DRY_FLAG

      # ── Upload artifacts on dry-run ──────────────────────────────────────────
      - name: 📤 Upload preview videos (dry-run only)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: preview-videos-${{ github.run_id }}
          path: ${{ runner.temp }}/faceless/
          retention-days: 3

      # ── Commit topic history (merge strategy avoids rebase conflicts) ────────
      - name: 💾 Save topic history
        if: always()
        run: |
          git config user.name  "Faceless Bot"
          git config user.email "bot@faceless.local"
          git add data/used_topics.json
          git diff --staged --quiet || \
            git commit -m "chore: update topic history [skip ci]"
          # Use merge instead of rebase — resolves conflicts by keeping our new entries
          git fetch origin main
          git merge origin/main -X ours --no-edit || true
          git push origin main
